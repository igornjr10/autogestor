name: Deploy para VPS Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.173.194
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /root/autogestor
            git pull origin master
            docker compose build --no-cache
            docker compose up -d
            echo "Deploy concluído!"
