name: Deploy para VPS Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.173.194
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            APP_DIR="/var/www/autogestor"

            # Clonar se não existir, ou apenas puxar updates
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/igornjr10/autogestor.git $APP_DIR
            else
              cd $APP_DIR
              git pull origin master
            fi

            cd $APP_DIR

            # ── Backend ────────────────────────────────────────────
            cd backend
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            cd ..

            # ── Frontend ───────────────────────────────────────────
            cd frontend
            npm ci
            npm run build
            cd ..

            # Copiar build do frontend para pasta pública do Nginx
            rm -rf /var/www/html/autogestor
            cp -r frontend/dist /var/www/html/autogestor

            # ── PM2 ────────────────────────────────────────────────
            pm2 describe autogestor-api > /dev/null 2>&1 \
              && pm2 restart autogestor-api \
              || pm2 start /var/www/autogestor/backend/dist/src/main.js \
                   --name autogestor-api \
                   --cwd /var/www/autogestor/backend

            pm2 save
