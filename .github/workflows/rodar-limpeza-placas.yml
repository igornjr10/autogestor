name: Limpar e recriar placas

on:
  workflow_dispatch:

jobs:
  run:
    name: Limpar placeholders e recriar via ConsultarPlaca
    runs-on: ubuntu-latest

    steps:
      - name: SSH → deploy + executar script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.173.194
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/autogestor
            git pull origin master
            docker compose build --no-cache backend
            docker compose up -d
            echo "Aguardando container iniciar..."
            sleep 20
            echo "--- Executando script de limpeza ---"
            docker compose exec -T backend node /app/prisma/limpar-e-recriar-placas.js
            echo "--- Concluído ---"
